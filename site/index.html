<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Memória - História do Brasil</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <header>
    <h1>🏛️ Jogo da Memória - História</h1>
    <p>Encontre a causa e a consequência dos fatos históricos!</p>
  </header>

  <div class="entrada-nome">
    <input type="text" id="nomeJogador" placeholder="Digite seu nome ou nome do Grupo..">
    <button id="btnConfirmarNome">Entrar no jogo da memoria</button>
  </div>

  <div class="painel hidden" id="painel">
    <div>Pontos: <span id="pontos">0</span></div>
    <div>Tempo: <span id="tempo">00:00</span></div>
    <button id="btnIniciar">Iniciar Missão</button>
  </div>

  <div id="orientacao">📱 Por favor, vire seu celular na horizontal!</div>

  <div class="tabuleiro" id="tabuleiro"></div>

  <div id="vitoria">
    <span id="mensagemVitoria"></span>
    <button id="btnReiniciar" class="hidden">Jogar Novamente</button>
  </div>

  <div id="placar">
    <h2>📜 Placar</h2>
    <ul id="listaPlacar"></ul>
  </div>

  <footer>Desenvolvido por Grupo de Flavio</footer>
</body>
</html>
